<main><h1>示例：给博客加暗色模式</h1>
<p class="summary">为博客增加可切换的暗色模式，记住用户选择。</p>
<section><h2>目标</h2><p>用户可一键切换明/暗，刷新后保持。</p></section>
<section><h2>非目标</h2><p>不做跟随系统时间自动切换。</p></section>
<section><h2>主流程</h2><ol><li>点击切换按钮</li><li>主题即时切换</li><li>选择写入 localStorage</li><li>下次访问读取并应用</li></ol></section>
<section><h2>存储</h2><table><tr><td>key</td><td>值</td></tr><tr><td>theme</td><td>light | dark</td></tr></table></section>
<section><h2>验收点</h2><ul><li data-id="AC-1"><strong>AC-1</strong><span class="pri">must</span>页面有可见的明/暗切换控件</li><li data-id="AC-2"><strong>AC-2</strong><span class="pri">must</span>切换后主题即时生效，无需刷新</li><li data-id="AC-3"><strong>AC-3</strong><span class="pri">must</span>刷新后保留上次选择</li><li data-id="AC-4"><strong>AC-4</strong><span class="pri">should</span>未设置过时默认明色</li></ul></section></main>
